<!--Task 3 -Develop a dynamic shopping cart system.
Requirements:
• Add, remove, and update product quantities.
• Display real-time total price.
• Use AI to:
o Manage cart state using JavaScript objects.
o Persist cart data in localStorage-->




<!--
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Shopping Cart</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f4f4;
    }

    h1 {
      text-align: center;
    }

    .products, .cart {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 20px 0;
    }

    .product, .cart-item {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      flex: 1 1 200px;
    }

    .product button, .cart-item button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      background: #007bff;
      color: #fff;
      cursor: pointer;
    }

    .product button:hover, .cart-item button:hover {
      background: #0056b3;
    }

    .cart-total {
      font-size: 1.2em;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Shopping Cart System</h1>


  <div class="products">
    <div class="product">
      <h3>Product A</h3>
      <p>Price: $10</p>
      <button onclick="addToCart('Product A', 10)">Add to Cart</button>
    </div>
    <div class="product">
      <h3>Product B</h3>
      <p>Price: $15</p>
      <button onclick="addToCart('Product B', 15)">Add to Cart</button>
    </div>
    <div class="product">
      <h3>Product C</h3>
      <p>Price: $20</p>
      <button onclick="addToCart('Product C', 20)">Add to Cart</button>
    </div>
  </div>

  
  <h2>Your Cart</h2>
  <div class="cart" id="cart"></div>
  <div class="cart-total" id="cart-total">Total: $0</div>

  <script>
    // Load cart from localStorage or initialize empty
    let cart = JSON.parse(localStorage.getItem('cart')) || {};

    // Add product to cart
    function addToCart(name, price) {
      if (cart[name]) {
        cart[name].quantity++;
      } else {
        cart[name] = { price: price, quantity: 1 };
      }
      saveCart();
      renderCart();
    }

    // Remove product from cart
    function removeFromCart(name) {
      delete cart[name];
      saveCart();
      renderCart();
    }

    // Update product quantity
    function updateQuantity(name, quantity) {
      if (quantity <= 0) {
        removeFromCart(name);
      } else {
        cart[name].quantity = quantity;
      }
      saveCart();
      renderCart();
    }

    // Save cart to localStorage
    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    // Render cart items
    function renderCart() {
      const cartContainer = document.getElementById('cart');
      cartContainer.innerHTML = '';
      let total = 0;

      for (let item in cart) {
        const product = cart[item];
        total += product.price * product.quantity;

        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <h4>${item}</h4>
          <p>Price: $${product.price}</p>
          <p>Quantity: 
            <input type="number" value="${product.quantity}" min="1" 
              onchange="updateQuantity('${item}', this.value)">
          </p>
          <p>Subtotal: $${product.price * product.quantity}</p>
          <button onclick="removeFromCart('${item}')">Remove</button>
        `;
        cartContainer.appendChild(div);
      }

      document.getElementById('cart-total').innerText = `Total: $${total}`;
    }

    // Initial render
    renderCart();
  </script>
</body>
</html>
-->

<!--Task 4 – Role-Based Access Control Application

o Maintain secure state transitions.
o Create scalable UI components.-->

<!--<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Role-Based Access Control</title>

  <div class="navbar">
    <button onclick="setRole('Admin')">Login as Admin</button>
    <button onclick="setRole('Editor')">Login as Editor</button>
    <button onclick="setRole('User')">Login as User</button>
  </div>

  
  <div id="admin-section" class="section">
    <h2>Admin Dashboard</h2>
    <p>Admins can manage users, settings, and system data.</p>
  </div>

  <div id="editor-section" class="section">
    <h2>Editor Panel</h2>
    <p>Editors can create and update content.</p>
  </div>

  <div id="user-section" class="section">
    <h2>User Area</h2>
    <p>Users can view and interact with content.</p>
  </div>

  <script>
    // Secure state management
    let currentRole = localStorage.getItem('role') || null;

    function setRole(role) {
      currentRole = role;
      localStorage.setItem('role', role);
      renderUI();
    }

    function renderUI() {
      // Hide all sections
      document.getElementById('admin-section').classList.remove('visible');
      document.getElementById('editor-section').classList.remove('visible');
      document.getElementById('user-section').classList.remove('visible');

      // Conditional rendering based on role
      if (currentRole === 'Admin') {
        document.getElementById('admin-section').classList.add('visible');
      } else if (currentRole === 'Editor') {
        document.getElementById('editor-section').classList.add('visible');
      } else if (currentRole === 'User') {
        document.getElementById('user-section').classList.add('visible');
      }
    }

    // Initial render
    renderUI();
  </script>
</body>
</html>
-->

Task 6 – Online Examination System
<!--Create an online exam interface.
Requirements:
• Timer, questions, and submission.
• Prevent multiple submissions.
• Use AI to:
o Manage exam state.
o Improve exam UX.
o Ensure accessibility.-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Online Exam</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #timer { font-size: 20px; color: red; }
    .question { margin-bottom: 15px; }
    button { padding: 10px; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Online Examination</h1>
  <div id="timer">Time Left: 30:00</div>

  <form id="examForm">
    <div class="question">
      <p>Q1: What is 2 + 2?</p>
      <input type="radio" name="q1" value="3"> 3<br>
      <input type="radio" name="q1" value="4"> 4<br>
      <input type="radio" name="q1" value="5"> 5<br>
    </div>

    <button type="submit">Submit Exam</button>
  </form>

  <script>
    // Timer
    let time = 30 * 60; // 30 minutes
    const timerElement = document.getElementById("timer");
    const interval = setInterval(() => {
      let minutes = Math.floor(time / 60);
      let seconds = time % 60;
      timerElement.textContent = `Time Left: ${minutes}:${seconds}`;
      time--;
      if (time < 0) {
        clearInterval(interval);
        document.getElementById("examForm").submit();
      }
    }, 1000);

    // Prevent multiple submissions
    document.getElementById("examForm").addEventListener("submit", (e) => {
      e.preventDefault();
      alert("Exam submitted successfully!");
      document.querySelector("button").disabled = true;
    });
  </script>
</body>
</html>
